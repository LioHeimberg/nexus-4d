<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus 4D</title>
    <link rel="stylesheet" href="assets/css/styles.css">
    <!-- Favicon and Apple Touch Icons -->
    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicon/manifest.json">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
    <!-- Android Chrome icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon/android-icon-192x192.png">
    <!-- iOS Safari icons -->
    <link rel="apple-touch-icon" sizes="57x57" href="/assets/favicon/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="/assets/favicon/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="/assets/favicon/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="/assets/favicon/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="/assets/favicon/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/assets/favicon/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/assets/favicon/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/favicon/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-icon-180x180.png">
    <!-- Windows 8/10 icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon/android-icon-192x192.png">
    <link rel="msapplication-TileImage" href="/assets/favicon/ms-icon-144x144.png">
    <link rel="msapplication-TileImage" href="/assets/favicon/ms-icon-150x150.png">
    <link rel="msapplication-TileImage" href="/assets/favicon/ms-icon-310x310.png">
    <link rel="msapplication-TileImage" href="/assets/favicon/ms-icon-70x70.png">
</head>
<body>
    <div id="app">
        <!-- Setup Wizard (shown if no admin exists) -->
        <div id="setup-page" class="page">
            <div class="setup-container">
                <div class="logo">
                    <span class="letter" style="--color: #2e63a8">R</span>
                    <span class="letter" style="--color: #30a3db">O</span>
                    <span class="letter" style="--color: #3eb074">K</span>
                    <span class="letter" style="--color: #ecd057">J</span>
                    <span class="letter" style="--color: #eb576b">A</span>
                    <span class="colon">:</span>
                    <span class="four-d">4D</span>
                </div>
                <h1>Setup Wizard</h1>
                <p class="subtitle">Create your admin account</p>
                
                <form id="setup-form" class="setup-form">
                    <div class="form-group">
                        <label for="admin-email">E-Mail</label>
                        <input type="email" id="admin-email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="admin-password">Passwort</label>
                        <input type="password" id="admin-password" name="password" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="admin-firstname">Vorname</label>
                        <input type="text" id="admin-firstname" name="first_name" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="admin-lastname">Nachname</label>
                        <input type="text" id="admin-lastname" name="last_name" required>
                    </div>
                    
                    <div id="setup-error-message" class="error-message"></div>
                    
                    <button type="submit" class="btn-primary">Admin erstellen & Login</button>
                </form>
            </div>
        </div>

        <!-- Login Page -->
        <!-- Login Page -->
        <div id="login-page" class="page active">
            <div class="login-container">
                <div class="logo">
                    <span class="letter" style="--color: #2e63a8">R</span>
                    <span class="letter" style="--color: #30a3db">O</span>
                    <span class="letter" style="--color: #3eb074">K</span>
                    <span class="letter" style="--color: #ecd057">J</span>
                    <span class="letter" style="--color: #eb576b">A</span>
                    <span class="colon">:</span>
                    <span class="four-d">4D</span>
                </div>
                <h1>Nexus 4D</h1>
                <p class="subtitle">Regionale Offene Kinder- und Jugendarbeit</p>
                
                <form id="login-form" class="login-form">
                    <div class="form-group">
                        <label for="email">E-Mail</label>
                        <input type="email" id="email" name="email" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">Passwort</label>
                        <input type="password" id="password" name="password" required>
                    </div>
                    
                    <div id="error-message" class="error-message"></div>
                    
                    <button type="submit" class="btn-primary">Anmelden</button>
                </form>
                
                <div class="button-group">
                    <div class="theme-toggle">
                        <button type="button" id="theme-toggle" aria-label="Theme umschalten">
                            <span id="theme-icon">☀</span>
                        </button>
                    </div>
                    <div class="guest-button">
                        <a href="/guest-review.html" class="btn-secondary">Feedback geben</a>
                    </div>
                </div>
                
                <div class="footer">
                    <p>© 2025 ROKJA:4D | Wünnewil-Flamatt | Schmitten | Ueberstorf</p>
                </div>
            </div>
        </div>

        <!-- Setup Footer -->
        <div class="setup-footer">
            <p>© 2025 ROKJA:4D | Wünnewil-Flamatt | Schmitten | Ueberstorf</p>
        </div>

        <!-- Dashboard Container (hidden by default) -->
        <div id="dashboard" class="dashboard hidden">
            <header class="dashboard-header">
                <div class="logo">
                    <span class="letter" style="--color: #2e63a8">R</span>
                    <span class="letter" style="--color: #30a3db">O</span>
                    <span class="letter" style="--color: #3eb074">K</span>
                    <span class="letter" style="--color: #ecd057">J</span>
                    <span class="letter" style="--color: #eb576b">A</span>
                    <span class="colon">:</span>
                    <span class="four-d">4D</span>
                </div>
                <nav class="main-nav">
                    <ul id="nav-menu"></ul>
                </nav>
                <div class="header-actions">
                    <div class="user-info">
                        <span id="user-name"></span>
                        <span id="user-role" class="role-badge"></span>
                    </div>
                    <button type="button" id="logout-btn" class="btn-secondary">Abmelden</button>
                </div>
            </header>

            <main class="dashboard-content">
                <!-- Dynamic content will be loaded here -->
                <div id="content-area"></div>
            </main>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>
</html>
