<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus 4D</title>
    <link rel="stylesheet" href="/assets/css/styles.css">
    <link rel="stylesheet" href="/assets/css/guest.css">
    <!-- Favicon and Apple Touch Icons -->
    <link rel="icon" type="image/x-icon" href="/assets/favicon/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-icon-180x180.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/assets/favicon/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/assets/favicon/favicon-16x16.png">
    <link rel="manifest" href="/assets/favicon/manifest.json">
    <meta name="msapplication-TileColor" content="#da532c">
    <meta name="theme-color" content="#ffffff">
    <!-- Android Chrome icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon/android-icon-192x192.png">
    <!-- iOS Safari icons -->
    <link rel="apple-touch-icon" sizes="57x57" href="/assets/favicon/apple-icon-57x57.png">
    <link rel="apple-touch-icon" sizes="60x60" href="/assets/favicon/apple-icon-60x60.png">
    <link rel="apple-touch-icon" sizes="72x72" href="/assets/favicon/apple-icon-72x72.png">
    <link rel="apple-touch-icon" sizes="76x76" href="/assets/favicon/apple-icon-76x76.png">
    <link rel="apple-touch-icon" sizes="114x114" href="/assets/favicon/apple-icon-114x114.png">
    <link rel="apple-touch-icon" sizes="120x120" href="/assets/favicon/apple-icon-120x120.png">
    <link rel="apple-touch-icon" sizes="144x144" href="/assets/favicon/apple-icon-144x144.png">
    <link rel="apple-touch-icon" sizes="152x152" href="/assets/favicon/apple-icon-152x152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/assets/favicon/apple-icon-180x180.png">
    <!-- Windows 8/10 icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/assets/favicon/android-icon-192x192.png">
    <link rel="msapplication-TileImage" href="/assets/favicon/ms-icon-144x144.png">
    <link rel="msapplication-TileImage" href="/assets/favicon/ms-icon-150x150.png">
    <link rel="msapplication-TileImage" href="/assets/favicon/ms-icon-310x310.png">
    <link rel="msapplication-TileImage" href="/assets/favicon/ms-icon-70x70.png">
</head>
<body>
    <div id="app">
        <div id="login-page" class="page active">
            <div class="login-container">
                <div class="logo">
                    <span class="letter" style="--color: #2e63a8">R</span>
                    <span class="letter" style="--color: #30a3db">O</span>
                    <span class="letter" style="--color: #3eb074">K</span>
                    <span class="letter" style="--color: #ecd057">J</span>
                    <span class="letter" style="--color: #eb576b">A</span>
                    <span class="colon">:</span>
                    <span class="four-d">4D</span>
                </div>
                <h1>Feedback geben</h1>
                <p class="subtitle">Regionale Offene Kinder- und Jugendarbeit</p>

                <form id="reviewForm">
                <div class="form-group">
                    <label for="memberSelect">Wer hat dich bedient?</label>
                    <select id="memberSelect" required>
                        <option value="">Wähle einen Jugendteam-Mitglied aus...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="eventSelect">Bei welcher Veranstaltung?</label>
                    <select id="eventSelect">
                        <option value="">Nicht bei einer Veranstaltung</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="barSelect">In welchem Rümli?</label>
                    <select id="barSelect">
                        <option value="">Nicht in einem Rümli</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="reviewerName">Dein Name (optional)</label>
                    <input type="text" id="reviewerName" placeholder="Dein Name (wird nur für deine eigene Erinnerung gespeichert)" autocomplete="name">
                </div>

                <div class="form-section">
                    <h2 class="page-title">Wie zufrieden warst du?</h2>
                    
                    <div class="form-row">
                        <div class="form-group-full">
                            <label class="rating-label">
                                <span class="rating-title">Freundlichkeit</span>
                                <div class="stars">
                                    <input type="radio" id="friendly-5" name="rating_friendly" value="5">
                                    <label for="friendly-5" class="star">★</label>
                                    <input type="radio" id="friendly-4" name="rating_friendly" value="4">
                                    <label for="friendly-4" class="star">★</label>
                                    <input type="radio" id="friendly-3" name="rating_friendly" value="3">
                                    <label for="friendly-3" class="star">★</label>
                                    <input type="radio" id="friendly-2" name="rating_friendly" value="2">
                                    <label for="friendly-2" class="star">★</label>
                                    <input type="radio" id="friendly-1" name="rating_friendly" value="1">
                                    <label for="friendly-1" class="star">★</label>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group-full">
                            <label class="rating-label">
                                <span class="rating-title">Professionell</span>
                                <div class="stars">
                                    <input type="radio" id="professional-5" name="rating_professional" value="5">
                                    <label for="professional-5" class="star">★</label>
                                    <input type="radio" id="professional-4" name="rating_professional" value="4">
                                    <label for="professional-4" class="star">★</label>
                                    <input type="radio" id="professional-3" name="rating_professional" value="3">
                                    <label for="professional-3" class="star">★</label>
                                    <input type="radio" id="professional-2" name="rating_professional" value="2">
                                    <label for="professional-2" class="star">★</label>
                                    <input type="radio" id="professional-1" name="rating_professional" value="1">
                                    <label for="professional-1" class="star">★</label>
                                </div>
                            </label>
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group-full">
                            <label class="rating-label">
                                <span class="rating-title">Gesamt</span>
                                <div class="stars">
                                    <input type="radio" id="overall-5" name="rating_overall" value="5">
                                    <label for="overall-5" class="star">★</label>
                                    <input type="radio" id="overall-4" name="rating_overall" value="4">
                                    <label for="overall-4" class="star">★</label>
                                    <input type="radio" id="overall-3" name="rating_overall" value="3">
                                    <label for="overall-3" class="star">★</label>
                                    <input type="radio" id="overall-2" name="rating_overall" value="2">
                                    <label for="overall-2" class="star">★</label>
                                    <input type="radio" id="overall-1" name="rating_overall" value="1">
                                    <label for="overall-1" class="star">★</label>
                                </div>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="form-group">
                    <label for="comment">Kommentar (optional)</label>
                    <textarea id="comment" rows="4" placeholder="Was hat dir besonders gut gefallen? Oder was könnten wir verbessern?"></textarea>
                </div>

                <button type="submit" class="btn-primary">Feedback absenden</button>
                
                <div id="error-message" class="error-message"></div>
                
                <div class="guest-button">
                    <a href="/index.html" class="btn-secondary">Zurück zum Login</a>
                </div>
                
 
            </div>

            <div class="footer">
                <p>© 2025 ROKJA:4D | Wünnewil-Flamatt | Schmitten | Ueberstorf</p>
            </div>
        </div>
    </div>

    <script src="/assets/js/guest.js"></script>
</body>
</html>
